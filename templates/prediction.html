{% extends "base.html" %}
 rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
{% block content %}

<div style="max-width:780px; margin: 4rem auto;">

    <div class="card" style="text-align:center; padding:3rem 2rem;">

        <div style="font-size:.75rem; font-family:var(--mono); color:var(--muted); letter-spacing:.08em; margin-bottom:1.5rem;">
            {{ model_name }} — PREDICTION RESULT
        </div>

        <div class="result-val">{{ prediction }}</div>
        <div class="result-label">Predicted output</div>

        {% if probability %}
<div class="prob-card" >
    
    <div class="prob-header">
        <span>Confidence</span>
        <span class="prob-value">{{ probability }}%</span>
    </div>
<div class="prob-fill"
     style="width: {{ probability }}%;"></div>
</div>
{% endif %}

    </div>

    <div style="display:flex; gap:.75rem; justify-content:center; margin-top:1.5rem;">
        <a href="/" class="btn btn-ghost">← New Dataset</a>
        <a href="javascript:history.back()" class="btn btn-primary">↩ Predict Again</a>
    </div>

</div>

{% endblock %}
