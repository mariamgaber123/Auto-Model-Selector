<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Model Selector</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <span class="dot"></span>
    Auto Model Selector
  </a>
  <div class="nav-links">
    <a href="/"          class="{{ 'active' if request.path == '/'          else '' }}">Upload</a>
    <a href="/visualize" class="{{ 'active' if request.path == '/visualize' else '' }}">Visualize</a>
  </div>
  <div class="nav-spacer"></div>
  
</nav>

<div class="page">
  {% if error is defined and error %}
    <div class="alert alert-error">⚠ {{ error }}</div>
  {% endif %}
  {% block content %}{% endblock %}
</div>

</body>
</html>
