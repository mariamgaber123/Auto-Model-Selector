{% extends "base.html" %}
{% block content %}

<h1>Visualize Data</h1>
<p class="subtitle">Choose the Chart and Select the Column</p>

<!-- ── Tab Bar ─────────────────────────────────────────────────────── -->
<div class="tab-bar">
    <button class="tab active" onclick="switchTab('histogram')">📊 Histogram</button>
    <button class="tab" onclick="switchTab('bar')">📶 Bar Chart</button>
    <button class="tab" onclick="switchTab('pie')">⭕ Pie Chart</button>
    <button class="tab" onclick="switchTab('cat_analysis')">🧮Stacked Bar</button>
    <button class="tab" onclick="switchTab('heatmap')">🌡 Heatmap</button>
    <button class="tab" onclick="switchTab('scatter')">⚬ Scatter Plot</button>
    <button class="tab" onclick="switchTab('boxplot')">▭ Box Plot</button>

</div>

<!-- ── Main Grid ───────────────────────────────────────────────────── -->
<div style="display:grid; grid-template-columns:260px 1fr; gap:1.25rem; align-items:start; margin-top:1.25rem;">

    <!-- Controls sidebar -->
    <div>

        <!-- Histogram panel -->
        <div class="ctrl-panel card" id="ctrl-histogram">
            <h3>Histogram</h3>
            <div class="form-group">
                <label>Numeric Column</label>
                <select id="hist-col">
                    {% for c in numeric_cols %}<option>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <button class="btn btn-primary full" onclick="generate('histogram')">Generate</button>
        </div>

        <!-- Bar Chart panel -->
        <div class="ctrl-panel card" id="ctrl-bar" style="display:none;">
            <h3>Bar Chart</h3>
            <div class="form-group">
                <label>Column</label>
                <select id="bar-col">
                    {% for c in categorical_cols %}<option>{{ c }}</option>{% endfor %}
                    {% for c in numeric_cols %}<option>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <button class="btn btn-primary full" onclick="generate('bar')">Generate</button>
        </div>

        <!-- Pie Chart panel -->
        <div class="ctrl-panel card" id="ctrl-pie" style="display:none;">
            <h3>Pie Chart</h3>
            <div class="form-group">
                <label>Categorical Column</label>
                <select id="pie-col">
                    {% for c in categorical_cols %}<option>{{ c }}</option>{% endfor %}
                    {% for c in numeric_cols %}<option>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <button class="btn btn-primary full" onclick="generate('pie')">Generate</button>
        </div>

        <!--  Chart panel -->
        <div class="ctrl-panel card" id="ctrl-cat_analysis" style="display:none;">
            <h3>Categorical Analysis</h3>
            <div class="form-group">
                <label>Primary Category (X-axis)</label>
                <select id="cat-col-1">
                    {% for c in categorical_cols %}<option>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Sub Category (Grouping)</label>
                <select id="cat-col-2">
                    {% for c in categorical_cols %}<option>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <button class="btn btn-primary full" onclick="generate('cat_analysis')">Generate Chart</button>
        </div>
        <!-- Heatmap panel -->
        <div class="ctrl-panel card" id="ctrl-heatmap" style="display:none;">
            <h3>Correlation Heatmap</h3>
            <button class="btn btn-primary full" onclick="generate('heatmap')">Generate</button>
        </div>

        <!-- Scatter panel -->
        <div class="ctrl-panel card" id="ctrl-scatter" style="display:none;">
            <h3>Scatter Plot</h3>
            <div class="form-group">
                <label>X — Feature</label>
                <select id="scatter-x">
                    {% for c in numeric_cols %}<option>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Y — Feature</label>
                <select id="scatter-y">
                    {% for c in numeric_cols %}<option>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <button class="btn btn-primary full" onclick="generate('scatter')">Generate</button>
        </div>

        <!-- Box Plot panel -->
        <div class="ctrl-panel card" id="ctrl-boxplot" style="display:none;">
            <h3>Box Plot</h3>
            <div class="form-group">
                <label>Category Column (X)</label>
                <select id="box-cat">
                    {% for c in categorical_cols %}<option>{{ c }}</option>{% endfor %}
                    {% for c in numeric_cols %}<option>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Numeric Column (Y)</label>
                <select id="box-num">
                    {% for c in numeric_cols %}<option>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <button class="btn btn-primary full" onclick="generate('boxplot')">Generate</button>
        </div>

        <!-- Error box -->
        <div id="errBox" class="alert alert-error"
            style="display:none; margin-top:1rem; white-space:pre-wrap; font-size:.74rem;"></div>
    </div>

    <!-- Plot output -->
    <div class="card plot-area" id="plotCard">
        <div id="placeholder">
            <div style="font-size:3.5rem; margin-bottom:.5rem;">📈</div>
            <div>Select Settings and press Generate</div>
        </div>
        <div id="spinner" style="display:none;">
            <div class="spin">⟳</div>
            <div style="font-size:.85rem; margin-top:.4rem;">Plotting... </div>
        </div>
        <img id="plotImg" src="" alt="chart" style="display:none; max-width:100%; border-radius:8px;">
    </div>

</div>

<!-- ── Styles ──────────────────────────────────────────────────────── -->
<style>
    .tab-bar {
        display: flex;
        gap: .5rem;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
        padding-bottom: .75rem;
    }

    .tab {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        padding: .5rem 1rem;
        border-radius: 8px;
        font-family: var(--sans);
        font-size: .82rem;
        cursor: pointer;
        transition: all .18s;
    }

    .tab:hover {
        color: var(--text);
        border-color: var(--accent);
    }

    .tab.active {
        background: rgba(59, 130, 246, .12);
        border-color: var(--accent);
        color: var(--accent);
        font-weight: 600;
    }

    .ctrl-panel h3 {
        margin-bottom: 1rem;
    }

    .full {
        width: 100%;
        justify-content: center;
        margin-top: .4rem;
    }

    .plot-area {
        min-height: 420px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }

    #placeholder {
        text-align: center;
        color: var(--muted);
        font-size: .88rem;
    }

    #spinner {
        text-align: center;
        color: var(--muted);
    }

    .spin {
        display: inline-block;
        font-size: 2.2rem;
        animation: spin .8s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
</style>

<!-- ── Script ──────────────────────────────────────────────────────── -->
<script>
    let activeTab = "histogram";

    function switchTab(name) {
        activeTab = name;
        // toggle tab buttons
        document.querySelectorAll(".tab").forEach((t, i) => {
            const names = ["histogram", "bar", "pie", "cat_analysis", "heatmap", "scatter", "boxplot"];
            t.classList.toggle("active", names[i] === name);
        });
        // toggle control panels
        document.querySelectorAll(".ctrl-panel").forEach(p => {
            p.style.display = p.id === "ctrl-" + name ? "block" : "none";
        });
        // reset output
        resetOutput();
    }

    function resetOutput() {
        document.getElementById("placeholder").style.display = "block";
        document.getElementById("plotImg").style.display = "none";
        document.getElementById("spinner").style.display = "none";
        document.getElementById("errBox").style.display = "none";
    }

    async function generate(type) {
        const errBox = document.getElementById("errBox");
        errBox.style.display = "none";
        document.getElementById("placeholder").style.display = "none";
        document.getElementById("plotImg").style.display = "none";
        document.getElementById("spinner").style.display = "flex";

        const fd = new FormData();
        fd.append("plot_type", type);

        if (type === "histogram") {
            fd.append("column", document.getElementById("hist-col").value);
        } else if (type === "bar") {
            fd.append("column", document.getElementById("bar-col").value);
        } else if (type === "pie") {
            fd.append("column", document.getElementById("pie-col").value);
        } else if (type === "cat_analysis") {
            fd.append("col1", document.getElementById("cat-col-1").value);
            fd.append("col2", document.getElementById("cat-col-2").value);
        } else if (type === "scatter") {
            fd.append("col_x", document.getElementById("scatter-x").value);
            fd.append("col_y", document.getElementById("scatter-y").value);
        } else if (type === "boxplot") {
            fd.append("col_cat", document.getElementById("box-cat").value);
            fd.append("col_num", document.getElementById("box-num").value);
        }
        // heatmap needs no extra params

        try {
            const res = await fetch("/get_plot", { method: "POST", body: fd });
            const data = await res.json();

            document.getElementById("spinner").style.display = "none";

            if (data.error) {
                errBox.textContent = data.error;
                errBox.style.display = "block";
                document.getElementById("placeholder").style.display = "block";
            } else {
                const img = document.getElementById("plotImg");
                img.src = "data:image/png;base64," + data.image;
                img.style.display = "block";
            }
        } catch (e) {
            document.getElementById("spinner").style.display = "none";
            document.getElementById("placeholder").style.display = "block";
            errBox.textContent = "Request failed: " + e.message;
            errBox.style.display = "block";
        }
    }
</script>

{% endblock %}
